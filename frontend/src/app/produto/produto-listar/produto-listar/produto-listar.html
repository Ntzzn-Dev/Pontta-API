<h1>Produtos</h1>
<button mat-raised-button (click)="cadastrar()">Cadastrar</button>

<br>
<br>
<br>

@if(produtos$ | async; as produtos){
    @for (produto of produtos; track produto.id) {
        <div>
            <b><label>Nome: {{produto.nome}} </label></b><br>
            <label>Categoria: {{produto.categoria}} </label><br>
            <label>Preco: R${{produto.preco}} </label><br>
            <button mat-raised-button (click)="editar(produto.id)">Editar</button>
        </div>
    } @empty {
        <p>Sem Produtos cadastrados</p>
    }
} @else {
    <p>Carregando...</p>
}
