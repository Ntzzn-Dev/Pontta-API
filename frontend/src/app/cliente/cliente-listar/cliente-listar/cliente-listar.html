<h1>Clientes</h1>
<button mat-raised-button (click)="cadastrar()">Cadastrar</button>

<br>
<br>
<br>

@if(clientes$ | async; as clientes){
    @for (cliente of clientes; track cliente.id) {
        <div>
            <b><label>Nome: {{cliente.nome}} </label></b><br>
            <label>Email: {{cliente.email}} </label><br>
            <button mat-raised-button (click)="editar(cliente.id)">Editar</button>
        </div>
    } @empty {
        <p>Sem Clientes cadastrados</p>
    }
} @else {
    <p>Carregando...</p>
}
