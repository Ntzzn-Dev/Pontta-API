<mat-toolbar>{{(this.prod && this.prod.id) ? 'Editar Produto' : 'Cadastrar Produto'}}</mat-toolbar>

<form *ngIf="formGroup" [formGroup]="formGroup" (ngSubmit)="formGroup.valid && salvar()" novalidate>
    <mat-form-field>
        <input matInput placeholder="Nome" formControlName="nome" autocomplete="off" required>
        <mat-error>Campo obrigatório</mat-error>
    </mat-form-field>
    <br>
    <mat-form-field>
        <input matInput placeholder="Categoria" formControlName="categoria" autocomplete="off">
    </mat-form-field>
    <br>
    <mat-form-field>
        <input matInput placeholder="Preco R$" formControlName="preco" autocomplete="off" type="number" value="0">
    </mat-form-field>
    <div>
        <button mat-raised-button [disabled]="!formGroup.valid">Salvar</button>
        @if(this.prod && this.prod.id){
            <button mat-raised-button (click)="excluir(this.prod.id)">Excluir</button>
        }
        <button mat-raised-button routerLink="/produtos">Cancelar</button>
    </div>
</form>
