<h1>Pedidos</h1>
<button mat-raised-button (click)="create()">Cadastrar</button>
<h2>Lista de pedidos: </h2>
@if (pedidos$ | async; as pedidos){
    @for(pedido of pedidos; track pedido.id){
        <div>
            <h3 style="margin: 0;">Cliente</h3>
            <div style="margin-left: 10px;">
                <label>Cliente: {{pedido.cliente.nome}}</label><br>
                <label>Contato: {{pedido.cliente.contato}}</label>
            </div>
            <h4 style="margin: 0;">Dados</h4>
            <label>Data do pedido: {{pedido.dataPedido | date:'dd/MM/yyyy HH:mm' }} </label><br>
            <label>Valor total: R${{pedido.valorTotal}} </label><br>
            <button mat-raised-button (click)="update(pedido.id)">Visualizar</button>
        </div>
    } @empty {
        <p>Sem pedidos</p>   
    }
} @else {
    <p>Carregando...</p>
}
