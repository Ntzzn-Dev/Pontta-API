<h1>Pedidos</h1>
<button mat-raised-button (click)="cadastrar()">Cadastrar</button>

<br>
<br>
<br>

@if(pedidos$ | async; as pedidos){
    @for (pedido of pedidos; track pedido.id) {
        <div>
            <b><label>CLIENTE:</label></b><br>
            <label>Nome: {{pedido.cliente.nome}} </label><br>
            <label>Email: {{pedido.cliente.email}} </label><br>
            <label>Data: {{pedido.dataPedido | date: 'dd/MM/yyyy HH:mm'}} </label><br>
            <button mat-raised-button (click)="editar(pedido.id)">Editar</button>
            <button mat-raised-button (click)="addProd(pedido.id)">Adicionar Produtos</button>
        </div>
    } @empty {
        <p>Sem Pedidos cadastrados</p>
    }
} @else {
    <p>Carregando...</p>
}
