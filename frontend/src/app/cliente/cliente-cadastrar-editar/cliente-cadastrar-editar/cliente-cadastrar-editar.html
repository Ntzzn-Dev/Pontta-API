<mat-toolbar>{{(this.cli && this.cli.id) ? 'Editar Cliente' : 'Cadastrar Cliente'}} </mat-toolbar>

<form *ngIf="formGroup" [formGroup]="formGroup" (ngSubmit)="formGroup.valid && salvar()" novalidate>
    <mat-form-field>
        <input matInput placeholder="Nome" formControlName="nome" autocomplete="off" required>
        <mat-error>Campo é obrigatório</mat-error>
    </mat-form-field>
    <br>
    <mat-form-field>
        <input matInput placeholder="Contato" formControlName="contato" autocomplete="off">
    </mat-form-field>
    <div>
        <button mat-raised-button color="primary" [disabled]="!formGroup.valid">Salvar</button>
        @if(this.cli && this.cli.id) {
            <button type="button" mat-raised-button color="warn" (click)="excluir(this.cli.id)">Excluir</button>
        }
        <button type="button" mat-raised-button routerLink="/clientes">Cancelar</button>
    </div>
</form>
